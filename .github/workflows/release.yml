name: Build & Release

on:
  push:
    branches:
      - "**"
    tags:
      - "v*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ matrix.artifact }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - artifact: maniac-darwin-arm64
            runner: macos-14
            entry: apps/maniac/src/cli.tsx
            target: bun-darwin-arm64
            output: maniac-darwin-arm64
          - artifact: maniac-darwin-x64-baseline
            runner: macos-13
            entry: apps/maniac/src/cli.tsx
            target: bun-darwin-x64-baseline
            output: maniac-darwin-x64-baseline
          - artifact: maniac-darwin-x64-modern
            runner: macos-13
            entry: apps/maniac/src/cli.tsx
            target: bun-darwin-x64-modern
            output: maniac-darwin-x64-modern
          - artifact: maniac-windows-arm64
            runner: windows-2022
            entry: apps/maniac/src/cli.tsx
            target: bun-windows-arm64
            output: maniac-windows-arm64.exe
          - artifact: maniac-windows-x64-baseline
            runner: windows-2022
            entry: apps/maniac/src/cli.tsx
            target: bun-windows-x64-baseline
            output: maniac-windows-x64-baseline.exe
          - artifact: maniac-windows-x64-modern
            runner: windows-2022
            entry: apps/maniac/src/cli.tsx
            target: bun-windows-x64-modern
            output: maniac-windows-x64-modern.exe
          - artifact: caymann-darwin-arm64
            runner: macos-14
            entry: apps/caymann/src/cli.tsx
            target: bun-darwin-arm64
            output: caymann-darwin-arm64
          - artifact: caymann-darwin-x64-baseline
            runner: macos-13
            entry: apps/caymann/src/cli.tsx
            target: bun-darwin-x64-baseline
            output: caymann-darwin-x64-baseline
          - artifact: caymann-darwin-x64-modern
            runner: macos-13
            entry: apps/caymann/src/cli.tsx
            target: bun-darwin-x64-modern
            output: caymann-darwin-x64-modern
          - artifact: caymann-windows-arm64
            runner: windows-2022
            entry: apps/caymann/src/cli.tsx
            target: bun-windows-arm64
            output: caymann-windows-arm64.exe
          - artifact: caymann-windows-x64-baseline
            runner: windows-2022
            entry: apps/caymann/src/cli.tsx
            target: bun-windows-x64-baseline
            output: caymann-windows-x64-baseline.exe
          - artifact: caymann-windows-x64-modern
            runner: windows-2022
            entry: apps/caymann/src/cli.tsx
            target: bun-windows-x64-modern
            output: caymann-windows-x64-modern.exe
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile --ignore-scripts

      - name: Compile ${{ matrix.artifact }}
        shell: bash
        run: |
          mkdir -p dist
          worker_entries="packages/shared/src/workers/compression.worker.ts packages/shared/src/workers/picocrypt.worker.ts"
          if [ "${{ matrix.entry }}" = "apps/maniac/src/cli.tsx" ]; then
            worker_entries="apps/maniac/src/workers/download.worker.ts ${worker_entries}"
          fi
          bun build \
            --compile \
            --target=${{ matrix.target }} \
            --format=esm \
            --bytecode \
            --minify \
            --sourcemap \
            --define BUILD_VERSION='"${{ github.ref_name }}"' \
            --define BUILD_COMMIT='"${{ github.sha }}"' \
            ${{ matrix.entry }} \
            ${worker_entries} \
            --outfile dist/${{ matrix.output }}
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum dist/${{ matrix.output }} > dist/${{ matrix.output }}.sha256
          else
            shasum -a 256 dist/${{ matrix.output }} > dist/${{ matrix.output }}.sha256
          fi

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            dist/${{ matrix.output }}
            dist/${{ matrix.output }}.sha256
          compression-level: 0

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List release assets
        run: ls -la dist

      - name: Create GitHub Release
        if: ${{ startsWith(github.ref, 'refs/tags/v') }}
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true

      - name: Compute pre-release tag
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        id: pretag
        shell: bash
        run: |
          git fetch --tags --force
          base_tag="$(git tag -l | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | sort -V | tail -n1)"
          if [ -z "${base_tag}" ]; then
            base_tag="v0.0.0"
          fi
          base_re="${base_tag//./\\.}"
          max_suffix="$(git tag -l "${base_tag}.*" | grep -E "^${base_re}\.[0-9]+$" | sed -E "s/^${base_re}\.([0-9]+)$/\\1/" | sort -n | tail -n1 || true)"
          if [ -z "${max_suffix}" ]; then
            max_suffix=0
          fi
          pre_tag="${base_tag}.$((max_suffix + 1))"
          echo "base_tag=${base_tag}" >> "${GITHUB_OUTPUT}"
          echo "pre_tag=${pre_tag}" >> "${GITHUB_OUTPUT}"

      - name: Create GitHub Pre-release
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.pretag.outputs.pre_tag }}
          target_commitish: ${{ github.sha }}
          name: Pre-release ${{ steps.pretag.outputs.pre_tag }}
          prerelease: true
          make_latest: false
          files: dist/*
